<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Envelope Budget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f2f2f7;
      --surface:       #ffffff;
      --accent:        #007aff;
      --label:         #1c1c1e;
      --label2:        #8e8e93;
      --sep:           #e5e5ea;
      --fill:          #f2f2f7;
      --fill-focus:    rgba(0, 122, 255, 0.09);
      --green:         #34c759;
      --orange:        #ff9f0a;
      --red:           #ff3b30;
      --r:             12px;
      --r-sm:          8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--label);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Header ─────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--sep);
      padding: calc(14px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) 14px calc(20px + env(safe-area-inset-left));
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.4px;
    }

    .btn-reset {
      font-size: 12px;
      font-weight: 500;
      color: var(--label2);
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 6px;
      letter-spacing: 0.1px;
      transition: color 0.15s, background 0.15s;
    }
    .btn-reset:hover {
      color: var(--red);
      background: rgba(255, 59, 48, 0.07);
    }

    /* ─── Layout ─────────────────────────────────────── */
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px 88px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── Summary Card ───────────────────────────────── */
    .summary-card {
      background: var(--surface);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04);
    }

    .bank-section {
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--sep);
    }

    .micro-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--label2);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 7px;
    }

    .bank-row {
      display: flex;
      align-items: baseline;
      gap: 3px;
    }

    .bank-prefix {
      font-size: 28px;
      font-weight: 600;
      color: var(--label2);
      line-height: 1;
      user-select: none;
    }

    #bankBalance {
      flex: 1;
      min-width: 0;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--label);
      background: transparent;
      border: none;
      outline: none;
    }
    #bankBalance::placeholder { color: #d1d1d6; }

    .totals-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .total-cell {
      padding: 15px 20px;
    }
    .total-cell + .total-cell {
      border-left: 1px solid var(--sep);
    }

    .total-value {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-top: 4px;
    }

    .status-bar {
      padding: 10px 20px;
      border-top: 1px solid var(--sep);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
    }
    .status-bar.reconciled { color: var(--green); }
    .status-bar.surplus    { color: var(--orange); }
    .status-bar.deficit    { color: var(--red); }

    /* ─── Section Header ─────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--label2);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      padding: 0 4px;
    }

    /* ─── Envelope List ──────────────────────────────── */
    .envelopes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ─── Envelope Card ──────────────────────────────── */
    .env-card {
      background: var(--surface);
      border-radius: var(--r);
      padding: 14px 16px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04);
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .env-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .env-name {
      flex: 1;
      min-width: 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--label);
      background: transparent;
      border: none;
      outline: none;
    }
    .env-name::placeholder { color: #c7c7cc; }

    .btn-del {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      border-radius: 50%;
      background: rgba(255, 59, 48, 0.10);
      border: none;
      color: var(--red);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 400;
      line-height: 1;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-del:hover { background: rgba(255, 59, 48, 0.18); }

    .env-fields {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 8px;
    }

    .env-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .env-field label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--label2);
      white-space: nowrap;
    }

    .env-field input {
      font-size: 15px;
      font-weight: 500;
      color: var(--label);
      background: var(--fill);
      border: none;
      outline: none;
      border-radius: var(--r-sm);
      padding: 8px 9px;
      width: 100%;
      transition: background 0.12s;
    }
    .env-field input:focus { background: var(--fill-focus); }
    .env-field input[type="number"] { text-align: center; }

    /* Remove number input spinners */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

    /* ─── Fill All Button ────────────────────────────── */
    .btn-fill-all {
      background: var(--surface);
      color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: var(--r);
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.14s, opacity 0.14s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-fill-all:hover  { background: var(--fill-focus); }
    .btn-fill-all:active { opacity: 0.75; }

    /* ─── Add Button ─────────────────────────────────── */
    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--r);
      padding: 15px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.14s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:hover  { opacity: 0.88; }
    .btn-add:active { opacity: 0.78; transform: scale(0.99); }

    .btn-add-icon {
      font-size: 22px;
      font-weight: 300;
      line-height: 1;
    }

    /* ─── Responsive ─────────────────────────────────── */
    @media (min-width: 480px) {
      .env-fields { gap: 10px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Envelope Budget</h1>
  <button class="btn-reset" id="btnReset">Reset All</button>
</header>

<main>

  <!-- ── Summary ── -->
  <div class="summary-card">
    <div class="bank-section">
      <div class="micro-label">Bank Account Balance</div>
      <div class="bank-row">
        <span class="bank-prefix">$</span>
        <input type="text" id="bankBalance" inputmode="decimal" placeholder="0.00" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div class="totals-grid">
      <div class="total-cell">
        <div class="micro-label">Total Envelopes</div>
        <div class="total-value" id="totalEnvelopes">$0.00</div>
      </div>
      <div class="total-cell">
        <div class="micro-label">Difference</div>
        <div class="total-value" id="difference">$0.00</div>
      </div>
    </div>

    <div class="status-bar reconciled" id="statusBar">✓ Reconciled — all money is assigned</div>
  </div>

  <!-- ── Envelopes ── -->
  <div class="section-label">Envelopes</div>
  <div class="envelopes-list" id="envelopesList"></div>

  <!-- ── Fill All ── -->
  <button class="btn-fill-all" id="btnFillAll">
    Fill All Balances → Weekly Amount
  </button>

  <!-- ── Add ── -->
  <button class="btn-add" id="btnAdd">
    <span class="btn-add-icon">+</span> Add Envelope
  </button>

  <p style="text-align:center; font-size:12px; color:var(--label2); margin-top:8px;">Made by Justin · v1.1</p>

</main>

<script>
  // ── Default data ────────────────────────────────────────────────────────
  const DEFAULTS = [
    { id: 1, name: 'Rent',       balance: 1200, monthly: 1200, dueDay: 1  },
    { id: 2, name: 'Groceries',  balance: 400,  monthly: 400,  dueDay: 15 },
    { id: 3, name: 'Utilities',  balance: 150,  monthly: 150,  dueDay: 20 },
    { id: 4, name: 'Gas',        balance: 100,  monthly: 100,  dueDay: 15 },
    { id: 5, name: 'Fun Money',  balance: 200,  monthly: 200,  dueDay: 1  },
  ];

  // ── State ───────────────────────────────────────────────────────────────
  let state = loadState();

  function loadState() {
    try {
      const raw = localStorage.getItem('envelopeBudget_v1');
      if (raw) return JSON.parse(raw);
    } catch (_) {}
    return {
      bankBalance: 2050,
      envelopes: DEFAULTS.map(e => ({ ...e })),
      nextId: 6,
    };
  }

  function save() {
    localStorage.setItem('envelopeBudget_v1', JSON.stringify(state));
  }

  // ── Formatting ──────────────────────────────────────────────────────────
  function fmt(n) {
    const abs = Math.abs(n);
    const s = abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return (n < 0 ? '-$' : '$') + s;
  }

  function fmtAbs(n) {
    return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtDisplay(n) {
    return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function parseMoney(s) {
    const n = parseFloat(String(s).replace(/[$,\s]/g, ''));
    return isNaN(n) ? 0 : n;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ── Summary ─────────────────────────────────────────────────────────────
  function updateSummary() {
    const bank  = state.bankBalance;
    const total = state.envelopes.reduce((s, e) => s + (e.balance || 0), 0);
    const diff  = bank - total;

    document.getElementById('totalEnvelopes').textContent = fmt(total);

    const diffEl  = document.getElementById('difference');
    const statusEl = document.getElementById('statusBar');

    if (Math.abs(diff) < 0.005) {
      diffEl.textContent = '$0.00';
      diffEl.style.color = 'var(--green)';
      statusEl.className = 'status-bar reconciled';
      statusEl.textContent = '✓ Reconciled — all money is assigned';
    } else if (diff > 0) {
      diffEl.textContent = fmtAbs(diff);
      diffEl.style.color = 'var(--orange)';
      statusEl.className = 'status-bar surplus';
      statusEl.textContent = `↑ ${fmtAbs(diff)} in bank not yet assigned to an envelope`;
    } else {
      diffEl.textContent = fmtAbs(diff);
      diffEl.style.color = 'var(--red)';
      statusEl.className = 'status-bar deficit';
      statusEl.textContent = `↓ Envelopes exceed bank balance by ${fmtAbs(diff)}`;
    }
  }

  // ── Render Envelopes ────────────────────────────────────────────────────
  function renderEnvelopes() {
    const list = document.getElementById('envelopesList');
    list.innerHTML = '';

    state.envelopes.forEach(env => {
      const card = document.createElement('div');
      card.className = 'env-card';
      card.dataset.id = env.id;

      card.innerHTML = `
        <div class="env-top">
          <input class="env-name" type="text" placeholder="Envelope name"
            value="${esc(env.name)}" data-field="name" data-id="${env.id}">
          <button class="btn-del" data-id="${env.id}" aria-label="Delete envelope">×</button>
        </div>
        <div class="env-fields">
          <div class="env-field">
            <label>Monthly Budget</label>
            <input type="text" inputmode="decimal"
              value="${fmtDisplay(env.monthly)}"
              data-field="monthly" data-id="${env.id}" data-raw="${env.monthly}">
          </div>
          <div class="env-field">
            <label>Due Date</label>
            <input type="number" inputmode="numeric" min="1" max="31"
              value="${env.dueDay}" data-field="dueDay" data-id="${env.id}">
          </div>
          <div class="env-field">
            <label>Current Balance</label>
            <input type="text" inputmode="decimal"
              value="${fmtDisplay(env.balance)}"
              data-field="balance" data-id="${env.id}" data-raw="${env.balance}">
          </div>
        </div>
      `;

      list.appendChild(card);
    });
  }

  // ── Envelope Events (delegated) ─────────────────────────────────────────
  const list = document.getElementById('envelopesList');

  // Focus: reveal raw number for money inputs
  list.addEventListener('focusin', e => {
    const inp = e.target.closest('input[data-field]');
    if (!inp) return;
    const field = inp.dataset.field;
    if (field === 'balance' || field === 'monthly') {
      const raw = parseFloat(inp.dataset.raw) || 0;
      inp.value = raw === 0 ? '' : String(raw);
      inp.select();
    } else if (field === 'dueDay') {
      inp.select();
    }
  });

  // Blur: format money inputs and persist
  list.addEventListener('focusout', e => {
    const inp = e.target.closest('input[data-field]');
    if (!inp) return;
    const id = parseInt(inp.dataset.id);
    const env = state.envelopes.find(x => x.id === id);
    if (!env) return;

    const field = inp.dataset.field;
    if (field === 'balance' || field === 'monthly') {
      const val = parseMoney(inp.value);
      env[field] = val;
      inp.value = fmtDisplay(val);
      inp.dataset.raw = val;
      updateSummary();
      save();
    }
  });

  // Input: live update
  list.addEventListener('input', e => {
    const inp = e.target.closest('input[data-field]');
    if (!inp) return;
    const id = parseInt(inp.dataset.id);
    const env = state.envelopes.find(x => x.id === id);
    if (!env) return;

    const field = inp.dataset.field;

    if (field === 'name') {
      env.name = inp.value;
      save();
    } else if (field === 'balance') {
      const val = parseMoney(inp.value);
      env.balance = val;
      inp.dataset.raw = val;
      updateSummary();
    } else if (field === 'monthly') {
      const val = parseMoney(inp.value);
      env.monthly = val;
      inp.dataset.raw = val;
    } else if (field === 'dueDay') {
      let val = parseInt(inp.value);
      if (isNaN(val) || val < 1) val = 1;
      if (val > 31) val = 31;
      env.dueDay = val;
      save();
    }
  });

  // Delete
  list.addEventListener('click', e => {
    const btn = e.target.closest('.btn-del');
    if (!btn) return;
    const id = parseInt(btn.dataset.id);
    state.envelopes = state.envelopes.filter(x => x.id !== id);
    renderEnvelopes();
    updateSummary();
    save();
  });

  // Fill ALL balances — add one week's amount to whatever is already there
  document.getElementById('btnFillAll').addEventListener('click', () => {
    state.envelopes.forEach(env => {
      env.balance = env.balance + env.monthly / 4;
    });
    renderEnvelopes();
    updateSummary();
    save();
  });

  // ── Bank Balance ────────────────────────────────────────────────────────
  const bankInput = document.getElementById('bankBalance');

  bankInput.addEventListener('focus', () => {
    const raw = state.bankBalance;
    bankInput.value = raw === 0 ? '' : String(raw);
    bankInput.select();
  });

  bankInput.addEventListener('input', () => {
    state.bankBalance = parseMoney(bankInput.value);
    updateSummary();
  });

  bankInput.addEventListener('blur', () => {
    bankInput.value = fmtDisplay(state.bankBalance);
    save();
  });

  // ── Add Envelope ────────────────────────────────────────────────────────
  document.getElementById('btnAdd').addEventListener('click', () => {
    const newEnv = { id: state.nextId++, name: '', balance: 0, monthly: 0, dueDay: 1 };
    state.envelopes.push(newEnv);
    renderEnvelopes();
    updateSummary();
    save();

    const cards = document.querySelectorAll('.env-card');
    if (cards.length) {
      const last = cards[cards.length - 1];
      const nameField = last.querySelector('.env-name');
      if (nameField) {
        last.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        setTimeout(() => nameField.focus(), 120);
      }
    }
  });

  // ── Reset ────────────────────────────────────────────────────────────────
  document.getElementById('btnReset').addEventListener('click', () => {
    if (!confirm('Reset everything back to the example envelopes? This cannot be undone.')) return;
    state = {
      bankBalance: 2050,
      envelopes: DEFAULTS.map(e => ({ ...e })),
      nextId: 6,
    };
    bankInput.value = fmtDisplay(state.bankBalance);
    renderEnvelopes();
    updateSummary();
    save();
  });

  // ── Init ────────────────────────────────────────────────────────────────
  bankInput.value = fmtDisplay(state.bankBalance);
  renderEnvelopes();
  updateSummary();
</script>

</body>
</html>
